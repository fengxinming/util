<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
      }
      #root {
        width: 100%;
        height: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <textarea id="root"></textarea>
    <script src="./dist/index.umd.js"></script>
    <script>
      xhrPromisify({
        url: './dist/index.js'
      }).then((res)=> {
        document.getElementById('root').value = res.data;
      });
    </script>
  </body>
</html>
